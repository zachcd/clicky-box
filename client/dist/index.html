<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Clicky Box</title>
    <script type="module" crossorigin src="/assets/index-CXDoZG7A.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DsOkuMK5.css">
  </head>
  <body>

    <!-- Colorblind toggle — fixed overlay, visible on every screen -->
    <button id="cb-toggle" aria-pressed="false" title="Colorblind mode: OFF">
      <span class="cb-icon">👁</span> CB
    </button>

    <!-- ── Connect ─────────────────────────────────────────────────────────── -->
    <div id="screen-connect" class="screen">
      <div class="card">
        <h1 class="game-title">Clicky Box</h1>
        <p class="subtitle">Multiplayer colour conquest</p>
        <div class="field">
          <input id="name-input" type="text" placeholder="Your name"
            maxlength="20" autocomplete="off" spellcheck="false" />
        </div>
        <div class="lobby-row">
          <span class="lobby-label">Lobby</span>
          <span id="lobby-slug-display" class="lobby-slug">global</span>
          <button id="new-lobby-btn" class="btn-text" title="Generate a fresh lobby URL">New ↻</button>
          <button id="clear-lobby-btn" class="btn-text" title="Clear custom lobby and return to global">Clear</button>
        </div>
        <button id="join-btn" class="btn btn-primary">Join Lobby</button>
        <p id="connect-error" class="error-msg"></p>
      </div>
    </div>

    <!-- ── Lobby ───────────────────────────────────────────────────────────── -->
    <div id="screen-lobby" class="screen hidden">
      <div class="card">
        <h2 class="card-title">Lobby</h2>

        <!-- Player list -->
        <ul id="player-list" class="player-list"></ul>

        <!-- Appearance customisation -->
        <div class="customise">
          <!-- Color label + custom picker on one row; swatches below at full width -->
          <div class="custom-row">
            <span class="custom-label">Color</span>
            <input type="color" id="custom-color" class="color-pick"
              title="Custom colour" value="#9B59B6" />
          </div>
          <div id="color-swatches" class="swatch-row"></div>
          <p id="color-warn" class="color-warn"></p>
          <div class="custom-row">
            <span class="custom-label">Border</span>
            <div id="border-style-row" class="bs-row"></div>
          </div>
        </div>

        <p id="lobby-status" class="lobby-status"></p>
        <div class="share-row">
          <input id="share-url" class="share-input" readonly
            title="Share this link to invite friends" />
          <button id="copy-link-btn" class="btn btn-sm">Copy Link</button>
        </div>
        <button id="ready-btn" class="btn btn-ready">Ready Up</button>
      </div>
    </div>

    <!-- ── Game ────────────────────────────────────────────────────────────── -->
    <div id="screen-game" class="screen screen-game hidden">

      <div id="hud">
        <div id="timer-bar-outer">
          <div id="timer-bar-wrap"><div id="timer-fill"></div></div>
          <div id="ping-marker"></div>
          <div id="ping-label"></div>
        </div>
        <div id="hud-row">
          <span id="turn-counter"></span>
          <div id="score-board"></div>
        </div>
      </div>

      <!-- Click any cell to select that colour -->
      <div id="game-body">
        <div id="canvas-wrap">
          <canvas id="grid-canvas"></canvas>
        </div>

        <!-- Right sidebar: floating score panel + live chart (desktop) -->
        <div id="sidebar">
          <span class="sb-title">Players</span>
          <div id="sidebar-scores"></div>
          <span class="sb-title sb-chart-label">Territory</span>
          <canvas id="live-chart" class="live-chart"></canvas>
        </div>
      </div>

      <!-- Colour picker — button click or Q / W / E / R -->
      <div id="color-bar">
        <button class="color-btn" data-color="0"></button>
        <button class="color-btn" data-color="1"></button>
        <button class="color-btn" data-color="2"></button>
        <button class="color-btn" data-color="3"></button>
      </div>
    </div>

    <!-- ── Game Over ───────────────────────────────────────────────────────── -->
    <div id="screen-gameover" class="screen hidden">
      <div class="card">
        <h2 class="card-title">Game Over</h2>
        <p id="winner-line" class="winner-line"></p>
        <div id="final-scores" class="final-scores"></div>
        <div id="accolades" class="accolades"></div>
        <p class="chart-title">Score history</p>
        <canvas id="score-chart" class="score-chart"></canvas>
        <p id="gameover-note" class="gameover-note"></p>

        <div class="history-shell">
          <div class="history-list-panel">
            <p class="chart-title">Match history</p>
            <div id="match-history-list" class="history-list"></div>
          </div>

          <div class="replay-panel">
            <div class="replay-header">
              <p id="replay-title" class="chart-title">Replay</p>
              <div class="replay-controls">
                <button id="replay-prev-btn" class="btn-text" title="Previous event">◀</button>
                <button id="replay-play-btn" class="btn-text" title="Play / pause">Play</button>
                <button id="replay-next-btn" class="btn-text" title="Next event">▶</button>
                <label class="replay-speed-wrap">
                  <span>Speed</span>
                  <select id="replay-speed" aria-label="Replay speed">
                    <option value="1">1×</option>
                    <option value="2">2×</option>
                    <option value="4">4×</option>
                    <option value="6" selected>6×</option>
                    <option value="8">8×</option>
                  </select>
                </label>
              </div>
            </div>
            <canvas id="replay-canvas" class="replay-canvas"></canvas>
            <input id="replay-seek" class="replay-seek" type="range" min="0" max="0" value="0" />
            <p id="replay-info" class="gameover-note"></p>
            <div id="replay-timeline" class="replay-timeline"></div>
          </div>
        </div>

        <button id="play-again-btn" class="btn btn-primary">Back to Lobby</button>
      </div>
    </div>

    <!-- ── Match history sidebar (non-game screens) ───────────────────────── -->
    <aside id="history-sidebar" class="history-sidebar hidden" aria-label="Match history sidebar">
      <div class="history-sidebar-card">
        <p class="chart-title">Recent matches</p>
        <div id="history-sidebar-list" class="history-list history-sidebar-list"></div>
        <div id="history-sidebar-details" class="history-sidebar-details"></div>
      </div>
    </aside>

  </body>
</html>
